<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EC4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="200" height="200" rx="36" fill="#1E1B4B"/>

  <!-- Left chevron < -->
  <polyline points="72,65 45,100 72,135" stroke="url(#grad1)" stroke-width="13" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right chevron > -->
  <polyline points="128,65 155,100 128,135" stroke="url(#grad2)" stroke-width="13" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Center code lines (horizontal dashes) -->
  <rect x="81" y="87" width="38" height="8" rx="4" fill="url(#grad1)" opacity="0.9"/>
  <rect x="86" y="102" width="28" height="8" rx="4" fill="#EC4899" opacity="0.8"/>
  <rect x="81" y="117" width="20" height="6" rx="3" fill="url(#grad2)" opacity="0.6"/>
  <!-- Dot -->
  <circle cx="108" cy="120" r="3" fill="#7C3AED" opacity="0.7"/>
</svg>
